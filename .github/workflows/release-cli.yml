name: Release CLI

on:
  pull_request:
    paths:
      - ".github/workflows/ci.yml"
      - ".github/workflows/release-cli.yml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "LICENSE"
      - "README.md"
      - "apps/review-cli/**"
      - "crates/**"
      - "docs/architecture/spec/cli-contract.md"
      - "docs/release/cli-distribution.md"
      - "docs/release/notes/**"
      - "examples/github-actions/**"
      - "package.json"
      - "packages/review-*/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "scripts/cli-release-*"
      - "scripts/fixtures/mock-codex.mjs"
      - "scripts/package-cli-release.mjs"
      - "scripts/verify-cli-release.mjs"
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-cli-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  preflight:
    name: Release preflight
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Require release tags to point at merged main history
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
          test "$(git cat-file -t "$GITHUB_REF")" = "tag"
          package_version=$(node -p "require('./apps/review-cli/package.json').version")
          test "$GITHUB_REF_NAME" = "v${package_version}"
          test -f "docs/release/notes/${GITHUB_REF_NAME}.md"

  package:
    name: Package ${{ matrix.target }}
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: linux-x64-gnu
          - runner: ubuntu-24.04-arm
            target: linux-arm64-gnu
          - runner: macos-15-intel
            target: macos-x64
          - runner: macos-15
            target: macos-arm64
          - runner: windows-2025
            target: windows-x64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Install pinned Rust toolchain
        run: rustup show active-toolchain
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
      - run: pnpm install --frozen-lockfile
      - name: Build and verify native release archive
        env:
          RELEASE_TARGET: ${{ matrix.target }}
        shell: bash
        run: >-
          pnpm release:cli:archive --out-dir release
          --expected-target "$RELEASE_TARGET" --verify
      - name: Upload native release archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: review-agent-cli-${{ matrix.target }}
          path: release/*
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish GitHub release
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    needs: package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      # Required to create or resume the release and replace its draft assets.
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Download native release archives
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: review-agent-cli-*
          path: release
          merge-multiple: true
      - name: Verify and combine checksums
        working-directory: release
        run: |
          set -euo pipefail
          for checksum in *.sha256; do
            sha256sum -c "$checksum"
          done
          cat ./*.sha256 | LC_ALL=C sort > SHA256SUMS
      - name: Create or resume draft, verify assets, and publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="$GITHUB_REF_NAME"
          notes_file="docs/release/notes/${tag}.md"
          rendered_notes=$(mktemp)
          sed "s/{{SOURCE_SHA}}/${GITHUB_SHA}/g" "$notes_file" > "$rendered_notes"
          generated_notes=$(mktemp)
          gh api --method POST "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="$tag" -f target_commitish="$GITHUB_SHA" --jq .body > "$generated_notes"
          expected_body_file=$(mktemp)
          cat "$rendered_notes" > "$expected_body_file"
          printf '\n\n' >> "$expected_body_file"
          cat "$generated_notes" >> "$expected_body_file"
          expected_body=$(cat "$expected_body_file")
          expected_title="Review Agent $tag"
          expected_assets=$(mktemp)
          find release -maxdepth 1 -type f -printf '%f\n' | LC_ALL=C sort > "$expected_assets"

          verify_release_metadata() {
            local actual_body actual_title
            actual_body=$(gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json body --jq .body)
            actual_title=$(gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json name --jq .name)
            if [[ "$actual_title" != "$expected_title" || "$actual_body" != "$expected_body" ]]; then
              echo "Release metadata does not match the canonical title and notes." >&2
              return 1
            fi
          }

          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            is_draft=$(gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json isDraft --jq .isDraft)
          else
            gh release create "$tag" --repo "$GITHUB_REPOSITORY" --draft \
              --verify-tag --notes-file "$expected_body_file" \
              --title "Review Agent $tag"
            is_draft=true
          fi
          verify_release_metadata

          verify_readback() {
            local readback
            readback=$(mktemp -d)
            gh release download "$tag" --repo "$GITHUB_REPOSITORY" --dir "$readback"
            while IFS= read -r asset; do
              cmp "release/$asset" "$readback/$asset"
            done < "$expected_assets"
          }

          if [[ "$is_draft" != "true" ]]; then
            actual_assets=$(mktemp)
            gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json assets \
              --jq '.assets[].name' | LC_ALL=C sort > "$actual_assets"
            diff -u "$expected_assets" "$actual_assets"
            verify_readback
            echo "Published release already matches every locally verified asset."
            exit 0
          fi

          gh release upload "$tag" release/* --repo "$GITHUB_REPOSITORY" --clobber
          actual_assets=$(mktemp)
          gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json assets \
            --jq '.assets[].name' | LC_ALL=C sort > "$actual_assets"
          while IFS= read -r extra_asset; do
            [[ -n "$extra_asset" ]] || continue
            gh release delete-asset "$tag" "$extra_asset" \
              --repo "$GITHUB_REPOSITORY" --yes
          done < <(comm -13 "$expected_assets" "$actual_assets")
          gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json assets \
            --jq '.assets[].name' | LC_ALL=C sort > "$actual_assets"
          diff -u "$expected_assets" "$actual_assets"
          verify_readback
          gh release edit "$tag" --repo "$GITHUB_REPOSITORY" --draft=false
          test "$(gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json isDraft --jq .isDraft)" = "false"
          verify_release_metadata
