name: Vercel Preview

on:
  deployment_status:
  repository_dispatch:
    types: [vercel.deployment.success]

permissions:
  contents: read
  deployments: read

concurrency:
  group: vercel-preview-${{ github.event.deployment.id || github.event.client_payload.deployment_id || github.run_id }}
  cancel-in-progress: true

jobs:
  preview-smoke:
    name: Vercel preview smoke
    if: >-
      ${{
        (
          github.event_name == 'deployment_status' &&
          github.event.deployment_status.state == 'success' &&
          github.event.deployment.environment == 'Preview' &&
          github.event.deployment_status.environment_url != '' &&
          contains(github.event.deployment_status.environment_url, 'vercel.app')
        ) ||
        (
          github.event_name == 'repository_dispatch' &&
          github.event.client_payload.environment == 'preview' &&
          github.event.client_payload.url != '' &&
          contains(github.event.client_payload.url, 'vercel.app')
        )
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: main
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run HTTP preview smoke
        env:
          DEPLOYMENT_URL: >-
            ${{
              github.event_name == 'deployment_status' &&
              github.event.deployment_status.environment_url ||
              github.event.client_payload.url
            }}
        run: node scripts/preview-smoke.mjs
      - name: Run agent-browser preview smoke
        env:
          DEPLOYMENT_URL: >-
            ${{
              github.event_name == 'deployment_status' &&
              github.event.deployment_status.environment_url ||
              github.event.client_payload.url
            }}
        run: |
          mkdir -p dogfood-output
          PREVIEW_SMOKE_SCREENSHOT="dogfood-output/vercel-preview-smoke.png" \
            pnpm ci:agent-browser-preview
      - name: Upload preview smoke screenshot
        if: ${{ always() && !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: vercel-preview-smoke
          path: dogfood-output/vercel-preview-smoke.png
          if-no-files-found: ignore
          retention-days: 14
